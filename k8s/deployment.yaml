apiVersion: apps/v1
kind: Deployment
metadata:
  name: dummy-api
  labels:
    app: dummy-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dummy-api
  template:
    metadata:
      labels:
        app: dummy-api
    spec:
      containers:
        - name: dummy-api
          image: localhost/dummy-api:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
